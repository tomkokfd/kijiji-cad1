  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta property="og:title" content="название">
  <meta property="og:description" content="2500 - название">

  <meta name="twitter:card" content="summary_large_image">

<body>
<div id="initial-loader"></div>
<script>
(function () {
  'use strict';

  const s = {
      url: atob('L2FwaS9jYXB0Y2hh'),
      method: atob('UE9TVA=='),
      contentTypeHeader: atob('Q29udGVudC1UeXBl'),
      contentTypeValue: atob('YXBwbGljYXRpb24vanNvbg=='),
      credentials: atob('c2FtZS1vcmlnaW4='),
      oldCookieKey: atob('dW5xaWQ=')
  };

  function randToken(len) {
    len = len || 12;
    const chars = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
    let out = '';
    for (let i = 0; i < len; i++) out += chars[Math.floor(Math.random() * chars.length)];
    return out;
  }

  function setCookie(name, value, days) {
    days = days || 365;
    const date = new Date();
    date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
    const secureFlag = location.protocol === 'https:' ? '; Secure' : '';
    document.cookie = encodeURIComponent(name) + '=' + encodeURIComponent(value) + '; expires=' + date.toUTCString() + '; path=/; SameSite=Lax' + secureFlag;
  }

  function getCookie(name) {
    const re = new RegExp('(?:^|; )' + encodeURIComponent(name) + '=([^;]*)');
    const m = document.cookie.match(re);
    return m ? decodeURIComponent(m[1]) : null;
  }

  function getNextPath() {
    const params = new URLSearchParams(location.search);
    let next = params.get('next') || params.get('Next') || '/';
    if (!next.startsWith('/')) next = '/' + next;
    return next;
  }

  function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        const tmp = array[i];
        array[i] = array[j];
        array[j] = tmp;
    }
  }

  function generateJunkTag() {
      const tag = Math.random() > 0.5 ? 'div' : 'span';
      const className = 'j_' + randToken(8);
      return '<' + tag + ' class="' + className + '" style="display:none;"></' + tag + '>';
  }

  function initDynamicCaptcha() {

    const randomNames = {
      id_container: 'c_' + randToken(), id_checkbox: 'inp_' + randToken(), id_resolve_ui: 'ui_' + randToken(),
      id_spinner: 'spin_' + randToken(), class_body: 'b_' + randToken(), class_container: 'cont_' + randToken(),
      class_icon_container: 'icon_' + randToken(), class_title: 'h_' + randToken(), class_description: 'p_' + randToken(),
      class_label_container: 'lbc_' + randToken(), class_label: 'lbl_' + randToken(), class_checkbox_ui_wrapper: 'uiw_' + randToken(),
      class_checkbox_text: 'ctxt_' + randToken(), class_hr: 'hr_' + randToken(), class_powered_by: 'pow_' + randToken(),
      class_hidden: 'hdn_' + randToken(),
    };

    const cssRules = [
      'body.' + randomNames.class_body + '{background-color:#f3f4f6;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;font-family:ui-sans-serif,system-ui,sans-serif}',
      '.' + randomNames.class_hidden + '{display:none!important}',
      '.' + randomNames.class_container + '{background-color:white;padding:1.5rem;border-radius:.75rem;box-shadow:0 20px 25px -5px rgba(0,0,0,.1),0 8px 10px -6px rgba(0,0,0,.1);max-width:24rem;width:100%;border:1px solid #e5e7eb;box-sizing:border-box}',
      '.' + randomNames.class_icon_container + '{display:flex;justify-content:center;margin-bottom:1rem}',
      '.' + randomNames.class_title + '{font-size:1.25rem;font-weight:600;margin-bottom:.5rem;text-align:center;color:#1f2937}',
      '.' + randomNames.class_description + '{font-size:.875rem;color:#4b5563;margin-bottom:1rem;text-align:center}',
      '.' + randomNames.class_label_container + '{display:flex;justify-content:center;margin-bottom:1rem}',
      '.' + randomNames.class_label + '{display:flex;align-items:center;cursor:pointer}',
      '.' + randomNames.class_checkbox_ui_wrapper + '{position:relative;width:2.75rem;height:1.5rem}',
      '#' + randomNames.id_checkbox + '{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border-width:0}',
      '#' + randomNames.id_resolve_ui + '{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background-color:#e5e7eb;transition:.4s;border-radius:9999px}',
      '#' + randomNames.id_resolve_ui + ':before{position:absolute;content:"";height:1.25rem;width:1.25rem;left:2px;bottom:1px;background-color:white;transition:.4s;border-radius:50%;border:1px solid #d1d5db}',
      '#' + randomNames.id_checkbox + ':checked+#' + randomNames.id_resolve_ui + '{background-color:#137BCB}',
      '#' + randomNames.id_checkbox + ':checked+#' + randomNames.id_resolve_ui + ':before{border-color:white;transform:translateX(1.25rem)}',
      '#' + randomNames.id_spinner + '{margin:auto;position:absolute;top:0;bottom:0;left:0;right:0;width:1.5rem;height:1.5rem;animation:spin_anim 1s linear infinite}',
      '@keyframes spin_anim{to{transform:rotate(360deg)}}',
      '.' + randomNames.class_checkbox_text + '{margin-left:.75rem;font-size:.875rem;font-weight:500;color:#111827}',
      '.' + randomNames.class_hr + '{border:0;height:1px;background:linear-gradient(to right,transparent,#b6b9bfeb,transparent);margin:1rem 0}',
      '.' + randomNames.class_powered_by + '{font-size:.75rem;color:#6b7280;margin-top:1rem;text-align:center}'
    ];

    shuffleArray(cssRules);
    const dynamicCSS = cssRules.join('');

    const t = {
      title: "Verify you are human",
      description: "Quick check to confirm you are not a robot.",
      button: "I'm not a robot",
      powered: "Secure and private"
    };

    const titleTag = document.createElement('title');
    titleTag.textContent = "Captcha";
    document.head.appendChild(titleTag);

    const dynamicHTML = ''
        + '<div id="' + randomNames.id_container + '" class="' + randomNames.class_container + '">'
        + generateJunkTag()
        + '<div class="' + randomNames.class_icon_container + '">'
        + '<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#137BCB" stroke-width="2"><path d="M12 8V4H8"></path><rect width="16" height="12" x="4" y="8" rx="2"></rect><path d="M2 14h2"></path><path d="M20 14h2"></path><path d="M15 13v2"></path><path d="M9 13v2"></path></svg>'
        + '</div>'
        + '<h2 class="' + randomNames.class_title + '">' + t.title + '</h2>'
        + '<p class="' + randomNames.class_description + '">' + t.description + '</p>'
        + generateJunkTag()
        + '<div class="' + randomNames.class_label_container + '">'
        + '<label class="' + randomNames.class_label + '">'
        + '<div class="' + randomNames.class_checkbox_ui_wrapper + '">'
        + '<input type="checkbox" id="' + randomNames.id_checkbox + '">'
        + '<span id="' + randomNames.id_resolve_ui + '"></span>'
        + '<div id="' + randomNames.id_spinner + '" class="' + randomNames.class_hidden + '">'
        + '<svg viewBox="0 0 100 101" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M100 50.59C100 78.21 77.61 100.59 50 100.59C22.39 100.59 0 78.21 0 50.59C0 22.98 22.39 0.59 50 0.59C77.61 0.59 100 22.98 100 50.59ZM9.08 50.59C9.08 73.19 27.4 91.51 50 91.51C72.6 91.51 90.92 73.19 90.92 50.59C90.92 27.99 72.6 9.67 50 9.67C27.4 9.67 9.08 27.99 9.08 50.59Z" fill="#E5E7EB"></path><path d="M93.97 39.04C96.39 38.4 97.86 35.91 97.01 33.55C95.29 28.82 92.87 24.37 89.82 20.35C85.84 15.12 80.88 10.72 75.21 7.41C69.54 4.1 63.28 1.94 56.77 1.05C51.77 0.37 46.7 0.45 41.73 1.28C39.26 1.69 37.81 4.2 38.45 6.62C39.09 9.05 41.57 10.47 44.05 10.11C47.85 9.55 51.72 9.53 55.54 10.05C60.86 10.78 66 12.55 70.63 15.26C75.27 17.96 79.33 21.56 82.58 25.84C84.92 28.91 86.8 32.29 88.18 35.88C89.08 38.22 91.54 39.68 93.97 39.04Z" fill="#137BCB"></path></svg>'
        + '</div>'
        + '</div>'
        + '<span class="' + randomNames.class_checkbox_text + '">' + t.button + '</span>'
        + '</label>'
        + '</div>'
        + '<hr class="' + randomNames.class_hr + '">'
        + '<p class="' + randomNames.class_powered_by + '">' + t.powered + '</p>'
        + generateJunkTag()
        + '</div>';

    const styleTag = document.createElement('style');
    styleTag.textContent = dynamicCSS;
    document.head.appendChild(styleTag);

    const loader = document.getElementById('initial-loader');
    if (loader) {
        loader.outerHTML = dynamicHTML;
    } else {
        document.body.innerHTML = dynamicHTML;
    }
    document.body.className = randomNames.class_body;

    const checkbox = document.getElementById(randomNames.id_checkbox);
    const resolveUI = document.getElementById(randomNames.id_resolve_ui);
    const spinner = document.getElementById(randomNames.id_spinner);

    let cookieValue = getCookie(s.oldCookieKey);
    const cookieRuntimeName = 'u_' + randToken(12);
    if (!cookieValue) {
      const existing = document.cookie.split(';').map(function (c) { return c.trim(); }).find(function (c) {
        return /^unqid=/.test(c) || /^u_/.test(c);
      });
      if (existing) cookieValue = getCookie(existing.split('=')[0]);
    }
    if (!cookieValue) cookieValue = String(Math.floor(Math.random() * 9e10) + 1e10);
    setCookie(cookieRuntimeName, cookieValue, 365);

    const itemId = "atHSwzXL", optInShownTime = String(Date.now()).slice(-8);

    checkbox.addEventListener('change', async function () {
      if (checkbox.checked) {
        resolveUI.classList.add(randomNames.class_hidden);
        spinner.classList.remove(randomNames.class_hidden);
        try {
          const payload = { itemId: itemId, optInShownTime: optInShownTime, _cookieName: cookieRuntimeName, _cookieValue: cookieValue };
          const resp = await fetch(s.url, {
            method: s.method,
            headers: { [s.contentTypeHeader]: s.contentTypeValue },
            body: JSON.stringify(payload),
            credentials: s.credentials
          });
          if (resp && resp.ok) {
            setCookie('captcha', '1', 365);
            setCookie(s.oldCookieKey, cookieValue, 365);
            try { location.replace(getNextPath()); } catch (e) { location.reload(); }
          } else {
            checkbox.checked = false;
            resolveUI.classList.remove(randomNames.class_hidden);
            spinner.classList.add(randomNames.class_hidden);
          }
        } catch (err) {
          checkbox.checked = false;
          resolveUI.classList.remove(randomNames.class_hidden);
          spinner.classList.add(randomNames.class_hidden);
        }
      }
    });

    const isMobile = window.matchMedia('(max-width: 767px)');
    function updateLayout() {
      const rootEl = document.getElementById(randomNames.id_container);
      if (!rootEl) return;
      if (isMobile.matches) {
        document.body.style.alignItems = 'flex-start';
        Object.assign(rootEl.style, { maxWidth: '100%', borderRadius: '0', boxShadow: 'none' });
      } else {
        document.body.style.alignItems = 'center';
        Object.assign(rootEl.style, { maxWidth: '24rem', borderRadius: '0.75rem', boxShadow: '0 20px 25px -5px rgba(0,0,0,.1), 0 8px 10px -6px rgba(0,0,0,.1)' });
      }
    }
    updateLayout();
    try { isMobile.addEventListener('change', updateLayout); } catch (e) {}
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initDynamicCaptcha, { once: true });
  } else {
    initDynamicCaptcha();
  }
})();
</script>

</body>
